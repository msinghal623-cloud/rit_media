[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/news-feed"
  to = "/.netlify/functions/news-feed"
  status = 200

[[redirects]]
  from = "/api/refresh-news"
  to = "/.netlify/functions/refresh-news-background"
  status = 200

[[redirects]]
  from = "/api/story-image"
  to = "/.netlify/functions/story-image"
  status = 200
